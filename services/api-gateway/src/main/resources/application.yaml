spring:
  cloud:
    gateway:
      server:
        webflux:


          routes:

            - id: user-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/users/**


            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**


            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**


            - id: inventory-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/inventory/**


            - id: payment-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/payments/**


            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/notifications/**

  application:
    name: api-gateway




server:
  port: 8090

jwt:
  secret: my-super-long-secret-key-for-event-driven-commerce-platform-jwt-authentication-2026